<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siddhi Class - Question Typing Work Hiring</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        .header { background-color: #ffffff; padding: 20px; text-align: center; border-bottom: 5px solid #00a8cc; }
        .header h1 { color: #003366; margin: 0; }
        .container { max-width: 600px; margin: 30px auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .hiring-banner { background-color: #00a8cc; color: white; text-align: center; padding: 10px; border-radius: 5px; margin-bottom: 20px; font-weight: bold; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #333; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .radio-group { display: flex; gap: 15px; margin-top: 10px; }
        .btn-submit { background-color: #003366; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; font-size: 18px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-submit:hover { background-color: #00a8cc; }
        .footer { text-align: center; margin-top: 20px; color: #777; font-size: 14px; }
        .info-box { background: #eef9ff; border-left: 5px solid #00a8cc; padding: 10px; margin-bottom: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://via.placeholder.com/150x50?text=SIDDHI+CLASS" alt="Siddhi Class Logo" style="display:none;">
    <h1>SIDDHI CLASS</h1>
    <p>Question Typing Work (Subject-Based)</p>
</div>

<div class="container">
    <div class="hiring-banner">WE ARE HIRING! APPLY NOW</div>
    
    <div class="info-box">
        <b>Salary:</b> According to work or Pay based on volume.<br>
        <b>Requirements:</b> Laptop (Good Subject Knowledge) or Mobile (For ECE, CS, EE).
    </div>

    <!-- फॉर्म का डेटा पाने के लिए आप Formspree का उपयोग कर सकते हैं -->
    <form action="https://formspree.io/f/YOUR_ID_HERE" method="POST">
        
        <label>आपका नाम (Full Name):</label>
        <input type="text" name="name" placeholder="अपना नाम लिखें" required>

        <label>व्हाट्सएप नंबर (WhatsApp Number):</label>
        <input type="tel" name="phone" placeholder="93402xxxxx" required>

        <label>ईमेल (Email):</label>
        <input type="email" name="email" placeholder="example@gmail.com">

        <label>ब्रांच चुनें (Select Branch):</label>
        <select name="branch" required>
            <option value="">--चुनें--</option>
            <option value="Computer Science">Computer Science (CS)</option>
            <option value="Electrical">Electrical (EE)</option>
            <option value="Electronics">Electronics (ECE)</option>
            <option value="Mechanical/Civil">Mechanical/Civil</option>
            <option value="Other">Other</option>
        </select>

        <label>उपलब्ध डिवाइस (Device You Have):</label>
        <div class="radio-group">
            <input type="radio" name="device" value="Laptop" id="laptop"> <label for="laptop" style="display:inline; font-weight:normal;">Laptop</label>
            <input type="radio" name="device" value="Mobile" id="mobile"> <label for="mobile" style="display:inline; font-weight:normal;">Mobile Phone</label>
        </div>

        <label>काम का प्रकार (Work Type):</label>
        <select name="work_type" required>
            <option value="Full Time">Full Time</option>
            <option value="Part Time">Part Time</option>
        </select>

        <label>क्या आप Govt. Exam (RRB/SSC JE) की तैयारी कर रहे हैं?</label>
        <div class="radio-group">
            <input type="radio" name="govt_prep" value="Yes" id="yes"> <label for="yes" style="display:inline; font-weight:normal;">हाँ</label>
            <input type="radio" name="govt_prep" value="No" id="no"> <label for="no" style="display:inline; font-weight:normal;">नहीं</label>
        </div>

        <button type="submit" class="btn-submit">Submit Application</button>
    </form>

    <div class="footer">
        संपर्क: 9340215707 (WhatsApp Message Only)<br>
        © 2024 Siddhi Class. All Rights Reserved.
    </div>
</div>

</body>
</html>
